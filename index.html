<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="手機可用的常見主食碳水與升糖速度查詢、份量計算與血糖紀錄" />
    <meta name="theme-color" content="#1f8a5f" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <title>主食碳水與血糖紀錄</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="auto">
    <main class="shell">
      <section class="top-panel" aria-labelledby="pageTitle">
        <div class="title-block">
          <p class="eyebrow">吃東西前查一下</p>
          <h1 id="pageTitle">主食碳水與血糖紀錄</h1>
          <p class="meta-line">查 100g 碳水、GI、GL，輸入實際份量算出當餐血糖負擔，並記錄餐前餐後反應</p>
        </div>

        <div class="controls" aria-label="查詢控制">
          <label class="search-box">
            <span>關鍵字</span>
            <input
              id="searchInput"
              type="search"
              inputmode="search"
              autocomplete="off"
              placeholder="白飯、地瓜、珍珠奶茶、雞排..."
            />
          </label>

          <label class="select-box">
            <span>分類</span>
            <select id="categoryFilter"></select>
          </label>

          <label class="select-box">
            <span>排序</span>
            <select id="sortSelect">
              <option value="name">名稱</option>
              <option value="carbsDesc">碳水高到低</option>
              <option value="carbsAsc">碳水低到高</option>
              <option value="giDesc">GI 高到低</option>
              <option value="giAsc">GI 低到高</option>
              <option value="glDesc">GL 高到低</option>
              <option value="glAsc">GL 低到高</option>
            </select>
          </label>
        </div>

        <div class="speed-tabs" aria-label="升糖速度篩選">
          <button class="speed-tab active" type="button" data-speed="all">全部</button>
          <button class="speed-tab" type="button" data-speed="slow">慢</button>
          <button class="speed-tab" type="button" data-speed="medium">中</button>
          <button class="speed-tab" type="button" data-speed="fast">快</button>
        </div>

        <div class="extra-tabs">
          <button class="toggle-btn" id="favOnlyBtn" type="button" aria-pressed="false">只看收藏</button>
        </div>

        <div class="view-tabs" aria-label="檢視模式">
          <button class="view-tab active" type="button" data-view="cards">清單</button>
          <button class="view-tab" type="button" data-view="table">表格</button>
          <button class="view-tab" type="button" data-view="diary">紀錄</button>
          <button class="view-tab" type="button" data-view="tools">工具</button>
        </div>
      </section>

      <section class="summary-bar" aria-label="查詢摘要">
        <div>
          <span id="resultCount" class="summary-number">0</span>
          <span class="summary-label">筆食物</span>
        </div>
        <div>
          <span id="favCount" class="summary-number">0</span>
          <span class="summary-label">收藏</span>
        </div>
        <div>
          <span id="recordCount" class="summary-number">0</span>
          <span class="summary-label">血糖紀錄</span>
        </div>
      </section>

      <section id="cards" class="cards" aria-live="polite"></section>

      <section id="tableWrap" class="table-wrap hidden" aria-live="polite">
        <table>
          <thead>
            <tr>
              <th aria-label="收藏"></th>
              <th>食物</th>
              <th>分類</th>
              <th>碳水 /100g</th>
              <th>GI</th>
              <th>GL /100g</th>
              <th>升糖</th>
              <th>紀錄</th>
              <th>備註</th>
            </tr>
          </thead>
          <tbody id="foodTable"></tbody>
        </table>
      </section>

      <section id="diary" class="diary hidden" aria-live="polite"></section>

      <section id="tools" class="tools hidden" aria-live="polite"></section>

      <p id="emptyState" class="empty-state hidden">找不到符合條件的食物。</p>

      <footer class="site-footer">
        <div>
          <strong>資料來源</strong>
          <a href="https://fdc.nal.usda.gov/api-guide/" target="_blank" rel="noreferrer">USDA</a>
          <a href="https://glycemicindex.com/gi-search/" target="_blank" rel="noreferrer">Sydney GI</a>
          <a href="https://www.fda.gov.tw/tc/site.aspx?r=979237699&sid=271" target="_blank" rel="noreferrer">TFDA</a>
        </div>
        <p>GI：低 ≤55、中 56-69、高 ≥70。GL = GI × 碳水 ÷ 100，把份量也納入考量。實際血糖反應因人而異，本站不取代醫療建議。</p>
      </footer>
    </main>

    <input type="file" id="importFileInput" accept="application/json" class="hidden" />
    <script src="./app.js"></script>
  </body>
</html>
